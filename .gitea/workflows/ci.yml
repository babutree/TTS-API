name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y espeak-ng ffmpeg libsndfile1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then
            python -m pip install -r requirements-dev.txt
          else
            python -m pip install torch==2.12.1+cpu --extra-index-url https://download.pytorch.org/whl/cpu
            python -m pip install fastapi uvicorn websockets pydantic edge-tts soundfile numpy kokoro "misaki[zh]"
          fi

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: Compile Python sources
        run: python -m py_compile app.py

      - name: Check inline script syntax
        shell: bash
        run: |
          node <<'NODE'
          const { execFileSync } = require('node:child_process');
          const fs = require('node:fs');
          const os = require('node:os');
          const path = require('node:path');

          const files = ['index.html', 'api.html'];
          const tempDir = fs.mkdtempSync(path.join(os.tmpdir(), 'inline-scripts-'));
          const scriptPattern = /<script\b([^>]*)>([\s\S]*?)<\/script>/gi;

          for (const file of files) {
            const html = fs.readFileSync(file, 'utf8');
            let count = 0;
            let match;

            while ((match = scriptPattern.exec(html)) !== null) {
              const attrs = match[1] || '';
              if (/\bsrc\s*=/.test(attrs)) {
                continue;
              }

              const code = match[2].trim();
              if (!code) {
                continue;
              }

              count += 1;
              const isModule = /\btype\s*=\s*['"]module['"]/i.test(attrs);
              const extension = isModule ? 'mjs' : 'js';
              const tempFile = path.join(tempDir, `${path.basename(file)}-${count}.${extension}`);
              fs.writeFileSync(tempFile, code, 'utf8');
              execFileSync(process.execPath, ['--check', tempFile], { stdio: 'inherit' });
            }

            console.log(`${file}: checked ${count} inline script(s)`);
          }
          NODE
